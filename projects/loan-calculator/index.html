<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Repayment Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator-wrapper">
            <h1>Loan Repayment Calculator</h1>
            
            <div class="input-section">
                <div class="input-group">
                    <label for="loanAmount">Loan Amount ($)</label>
                    <input type="number" id="loanAmount" placeholder="Enter loan amount" value="200000" min="0" step="1000">
                </div>

                <div class="input-group">
                    <label for="interestRate">Annual Interest Rate (%)</label>
                    <input type="number" id="interestRate" placeholder="Enter interest rate" value="5.5" min="0" max="100" step="0.01">
                </div>

                <div class="input-group">
                    <label for="loanTerm">Loan Term (Years)</label>
                    <input type="number" id="loanTerm" placeholder="Enter loan term" value="30" min="1" max="50" step="1">
                </div>

                <button id="calculateBtn" class="calculate-btn">Calculate</button>
            </div>

            <div class="results-section" id="resultsSection" style="display: none;">
                <div class="results-summary">
                    <div class="result-card">
                        <h3>Monthly Payment</h3>
                        <p class="result-value" id="monthlyPayment">$0.00</p>
                    </div>
                    <div class="result-card">
                        <h3>Total Interest</h3>
                        <p class="result-value" id="totalInterest">$0.00</p>
                    </div>
                    <div class="result-card">
                        <h3>Total Amount</h3>
                        <p class="result-value" id="totalAmount">$0.00</p>
                    </div>
                </div>

                <div class="amortization-section">
                    <h2>Amortization Schedule</h2>
                    <div class="table-wrapper">
                        <table id="amortizationTable">
                            <thead>
                                <tr>
                                    <th>Payment #</th>
                                    <th>Payment Amount</th>
                                    <th>Principal</th>
                                    <th>Interest</th>
                                    <th>Remaining Balance</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="error-message" id="errorMessage" style="display: none;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
